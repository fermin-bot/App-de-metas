<div class="p-4 space-y-4">
  <div class="flex justify-between items-center">
    <h1 class="text-2xl font-bold text-gray-800">Rutina Diaria</h1>
    <div class="flex space-x-2">
      <button (click)="resetDaily()" class="bg-gray-200 text-gray-700 p-2 rounded-full shadow hover:bg-gray-300 transition" title="Reiniciar día">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" />
        </svg>
      </button>
      <button (click)="toggleForm()" class="bg-blue-600 text-white p-2 rounded-full shadow-lg hover:bg-blue-700 transition">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4" />
        </svg>
      </button>
    </div>
  </div>

  @if (showForm) {
    <div class="bg-white p-4 rounded-lg shadow-md animate-fade-in">
      <h2 class="text-lg font-semibold mb-3">Nueva Actividad</h2>
      <form [formGroup]="routineForm" (ngSubmit)="addRoutineItem()" class="space-y-3">
        <div>
          <label class="block text-sm font-medium text-gray-700">Hora</label>
          <input type="time" formControlName="time" class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-blue-500 focus:ring-blue-500 border p-2">
        </div>

        <div>
          <label class="block text-sm font-medium text-gray-700">Actividad</label>
          <input type="text" formControlName="activity" class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-blue-500 focus:ring-blue-500 border p-2">
        </div>

        <div class="flex justify-end space-x-2 pt-2">
          <button type="button" (click)="toggleForm()" class="px-4 py-2 bg-gray-200 text-gray-800 rounded-md hover:bg-gray-300">Cancelar</button>
          <button type="submit" [disabled]="routineForm.invalid" class="px-4 py-2 bg-blue-600 text-white rounded-md hover:bg-blue-700 disabled:opacity-50">Guardar</button>
        </div>
      </form>
    </div>
  }

  <div class="space-y-3">
    @for (item of routine$ | async; track item.id) {
      <div class="flex items-center bg-white p-4 rounded-lg shadow border-l-4" [ngClass]="{'border-green-500': item.completed, 'border-gray-300': !item.completed}">
        <div class="mr-4 text-center min-w-[3rem]">
          <span class="block text-lg font-bold text-gray-700">{{ item.time }}</span>
        </div>
        
        <div class="flex-1">
          <p class="text-gray-800 font-medium" [class.line-through]="item.completed" [class.text-gray-400]="item.completed">
            {{ item.activity }}
          </p>
        </div>

        <div class="flex items-center space-x-3">
          <input 
            type="checkbox" 
            [checked]="item.completed" 
            (change)="toggleRoutineItem(item)"
            class="h-6 w-6 text-green-600 rounded focus:ring-green-500 border-gray-300">
          
          <button (click)="deleteRoutineItem(item.id)" class="text-gray-400 hover:text-red-500">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" />
            </svg>
          </button>
        </div>
      </div>
    } @empty {
      <div class="text-center py-10 text-gray-500">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-16 w-16 mx-auto mb-4 text-gray-300" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z" />
        </svg>
        <p>Configura tu rutina diaria para optimizar tu tiempo.</p>
      </div>
    }
  </div>
</div>
