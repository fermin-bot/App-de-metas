<div class="p-4 space-y-4">
  <div class="flex justify-between items-center">
    <h1 class="text-2xl font-bold text-gray-800">Tareas</h1>
    <button (click)="toggleForm()" class="bg-blue-600 text-white p-2 rounded-full shadow-lg hover:bg-blue-700 transition">
      <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4" />
      </svg>
    </button>
  </div>

  <div class="flex space-x-1 bg-gray-200 p-1 rounded-lg">
    <button (click)="setType('daily')" 
            [class.bg-white]="(selectedType$ | async) === 'daily'"
            [class.shadow-sm]="(selectedType$ | async) === 'daily'"
            class="flex-1 py-1.5 text-sm font-medium rounded-md text-center transition-all">
      Diarias
    </button>
    <button (click)="setType('monthly')" 
            [class.bg-white]="(selectedType$ | async) === 'monthly'"
            [class.shadow-sm]="(selectedType$ | async) === 'monthly'"
            class="flex-1 py-1.5 text-sm font-medium rounded-md text-center transition-all">
      Mensuales
    </button>
    <button (click)="setType('annual')" 
            [class.bg-white]="(selectedType$ | async) === 'annual'"
            [class.shadow-sm]="(selectedType$ | async) === 'annual'"
            class="flex-1 py-1.5 text-sm font-medium rounded-md text-center transition-all">
      Anuales
    </button>
  </div>

  @if (showForm) {
    <div class="bg-white p-4 rounded-lg shadow-md animate-fade-in">
      <h2 class="text-lg font-semibold mb-3">Nueva Tarea</h2>
      <form [formGroup]="taskForm" (ngSubmit)="addTask()" class="space-y-3">
        <div>
          <label class="block text-sm font-medium text-gray-700">Título</label>
          <input type="text" formControlName="title" class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-blue-500 focus:ring-blue-500 border p-2">
        </div>

        @if ((selectedType$ | async) === 'daily') {
          <div>
            <label class="block text-sm font-medium text-gray-700">Fecha</label>
            <input type="date" formControlName="date" class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-blue-500 focus:ring-blue-500 border p-2">
          </div>
        }

        @if ((selectedType$ | async) === 'monthly') {
          <div class="flex space-x-2">
            <div class="flex-1">
              <label class="block text-sm font-medium text-gray-700">Mes</label>
              <select formControlName="month" class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-blue-500 focus:ring-blue-500 border p-2">
                @for (month of months; track $index) {
                  <option [value]="$index">{{month}}</option>
                }
              </select>
            </div>
            <div class="flex-1">
              <label class="block text-sm font-medium text-gray-700">Año</label>
              <select formControlName="year" class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-blue-500 focus:ring-blue-500 border p-2">
                @for (year of years; track year) {
                  <option [value]="year">{{year}}</option>
                }
              </select>
            </div>
          </div>
        }

        @if ((selectedType$ | async) === 'annual') {
          <div>
            <label class="block text-sm font-medium text-gray-700">Año</label>
            <select formControlName="year" class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-blue-500 focus:ring-blue-500 border p-2">
              @for (year of years; track year) {
                <option [value]="year">{{year}}</option>
              }
            </select>
          </div>
        }

        <div class="flex justify-end space-x-2 pt-2">
          <button type="button" (click)="toggleForm()" class="px-4 py-2 bg-gray-200 text-gray-800 rounded-md hover:bg-gray-300">Cancelar</button>
          <button type="submit" [disabled]="taskForm.invalid" class="px-4 py-2 bg-blue-600 text-white rounded-md hover:bg-blue-700 disabled:opacity-50">Guardar</button>
        </div>
      </form>
    </div>
  }

  <div class="space-y-2">
    @for (task of tasks$ | async; track task.id) {
      <div class="flex items-center bg-white p-3 rounded-lg shadow">
        <input 
          type="checkbox" 
          [checked]="task.completed" 
          (change)="toggleTask(task)"
          class="h-5 w-5 text-blue-600 rounded focus:ring-blue-500 border-gray-300">
        
        <span class="ml-3 flex-1 text-gray-800" [class.line-through]="task.completed" [class.text-gray-400]="task.completed">
          {{ task.title }}
        </span>

        <button (click)="deleteTask(task.id)" class="text-gray-400 hover:text-red-500 ml-2">
          <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" />
          </svg>
        </button>
      </div>
    } @empty {
      <div class="text-center py-10 text-gray-500">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-12 w-12 mx-auto mb-3 text-gray-300" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-3 7h3m-3 4h3m-6-4h.01M9 16h.01" />
        </svg>
        <p>No hay tareas para este periodo.</p>
      </div>
    }
  </div>
</div>
